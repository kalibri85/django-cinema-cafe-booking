{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cinema Cafe{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'booking/css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Cinema Cafe</div>
        <ul class="nav-links">
            <li><a href="#">About</a></li>
            <li><a href="/repertoire/">Book</a></li>
            <li><a href="#">Menu</a></li>

    <div class="{% block body_class %}{% endblock %}">
        {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
