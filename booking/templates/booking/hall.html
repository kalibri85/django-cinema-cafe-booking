{% load booking_extras %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Cafe — Book a seat</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .screen {
            background: #333;
            color: #fff;
            width: 60%;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .row {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
            justify-content: center;
        }

        .table-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .table-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #555;
        }

        .seats-row {
            display: flex;
            gap: 6px;
        }

        .seat {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid;
        }

        .seat.available {
            background: #EAF3DE;
            border-color: #3B6D11;
            color: #27500A;
        }

        .seat.booked {
            background: #FCEBEB;
            border-color: #A32D2D;
            color: #791F1F;
            cursor: not-allowed;
        }

        .seat.reserved {
            background: #D3D1C7;
            border-color: #5F5E5A;
            color: #2C2C2A;
            cursor: not-allowed;
        }

        .legend {
            display: flex;
            gap: 16px;
            margin-top: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            border: 2px solid;
        }

        .info {
            margin-top: 1.5rem;
            font-size: 14px;
            color: #555;
            min-height: 20px;
        }

        .btn-book {
            margin-top: 1rem;
            padding: 10px 28px;
            background: #185FA5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }

        .btn-book:hover {
            background: #0C447C;
        }
        .seat-wrapper {
            position: relative;
            display: inline-flex;
        }

        .discount-badge {
            position: absolute;
            top: -8px;
            right: -3px;
            background: #E24B4A;
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="screen">SCREEN</div>

    <div id="hall">
        <div class="row">
            {% for table in row1 %}
                {% include "booking/table_unit.html" %}
            {% endfor %}
        </div>

        <div class="row">
            {% for table in row2 %}
                {% include "booking/table_unit.html" %}
            {% endfor %}
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#EAF3DE; border-color:#3B6D11"></div> Available
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#FCEBEB; border-color:#A32D2D"></div> Booked
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#D3D1C7; border-color:#5F5E5A"></div> Reserved
        </div>
    </div>

    <div class="info" id="info">Click on a seat to select</div>
    <button class="btn-book" id="btn-book" onclick="bookSeats()">Book</button>

    <script>
        const selectedSeats = [];
        const isolatedSeatIds = {{ isolated_discounts|safe }};
        const oddSeatIds = {{ odd_seat_discounts|safe }};

        function selectSeat(el) {
            if (el.dataset.status === 'booked' || el.dataset.status === 'reserved') return;

            const seatId = el.dataset.seatId;

            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                el.style.background = '#EAF3DE';
                el.style.borderColor = '#3B6D11';
                el.style.color = '#27500A';
                selectedSeats.splice(selectedSeats.indexOf(seatId), 1);
            } else {
                el.classList.add('selected');
                el.style.background = '#B5D4F4';
                el.style.borderColor = '#185FA5';
                el.style.color = '#0C447C';
                selectedSeats.push(seatId);
            }

            updateInfo();
        }

        function updateInfo() {
            const info = document.getElementById('info');
            const btn = document.getElementById('btn-book');
            const n = selectedSeats.length;

            if (n === 0) {
                info.textContent = 'Click on a seat to select';
                btn.style.display = 'none';
            } else {
                const nonIsolatedCount = selectedSeats.filter(id => !isolatedSeatIds.hasOwnProperty(id)).length;
                const hasOddSeat = selectedSeats.some(id => oddSeatIds.hasOwnProperty(id));
                let msg = `Selected ${n} seat(s)`;
                if (!hasOddSeat && nonIsolatedCount % 2 !== 0) {
                    msg = `Add one more seat with {{ odd_discount }}% discount to ensure your comfort!`;
                }
                info.textContent = msg;
                btn.style.display = 'block';
            }
        }

        function bookSeats() {
            if (selectedSeats.length === 0) return;

            const n = selectedSeats.length;
            document.getElementById('modal-seats-info').textContent = `You are booking ${n} seat(s)`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-error').textContent = '';
        }

        function submitBooking() {
            const name = document.getElementById('customer-name').value.trim();
            const email = document.getElementById('customer-email').value.trim();

            if (!name || !email) {
                document.getElementById('modal-error').textContent = 'Please fill in all fields';
                return;
            }

            const reservePromises = selectedSeats.map(seatId =>
                fetch(`/book/${seatId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}',
                        'Content-Type': 'application/json',
                    },
                }).then(res => res.json())
            );

            Promise.all(reservePromises).then(results => {
                const allReserved = results.every(r => r.success);
                if (!allReserved) {
                    document.getElementById('modal-error').textContent = 'Some seats are no longer available.';
                    return;
                }

                fetch('/confirm/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}',
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `customer_name=${encodeURIComponent(name)}&customer_email=${encodeURIComponent(email)}&seat_ids=${selectedSeats.join(',')}`
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        closeModal();
                        window.location.href = '/payment/'
                    } else {
                        document.getElementById('modal-error').textContent = 'Something went wrong. Please try again.';
                    }
                })
                .catch(() => {
                    document.getElementById('modal-error').textContent = 'Connection error. Please try again.';
                });
            });
        }
    </script>
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
        <div style="background:white; padding:2rem; border-radius:12px; width:320px;">
            <h3>Confirm booking</h3>
            <p id="modal-seats-info" style="color:#555; font-size:14px;"></p>
            <input type="text" id="customer-name" placeholder="Your name" 
                    value="{{ pending_name }}"
                    style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
            <input type="email" id="customer-email" placeholder="Your email" 
                    value="{{ pending_email }}"
                    style="width:100%; padding:8px; margin-bottom:16px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
            <div style="display:flex; gap:10px;">
                <button onclick="submitBooking()" style="flex:1; padding:10px; background:#185FA5; color:white; border:none; border-radius:6px; cursor:pointer;">Confirm</button>
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#ddd; border:none; border-radius:6px; cursor:pointer;">Cancel</button>
            </div>
            <p id="modal-error" style="color:red; font-size:13px; margin-top:8px;"></p>
        </div>
    </div>
</body>
</html>
