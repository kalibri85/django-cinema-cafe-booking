{% load booking_extras %}
<div class="table-unit">
    <div class="table-circle">T{{ table.number }}</div>
    <div class="seats-row">
        {% for seat in table.seats.all %}
            <div class="seat-wrapper">
                {% if seat.id in odd_seat_discounts %}
                    <div class="discount-badge" style="background:#EF9F27;">-{{ odd_seat_discounts|get_item:seat.id }}%</div>
                {% elif seat.id in isolated_discounts %}
                    <div class="discount-badge">-{{ isolated_discounts|get_item:seat.id }}%</div>
                {% endif %}
                <div class="seat {{ seat.status }}"
                     data-seat-id="{{ seat.id }}"
                     data-status="{{ seat.status }}"
                     onclick="selectSeat(this)">
                    {{ seat.number }}
                </div>
            </div>
        {% endfor %}
    </div>
</div>
